<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naive SGD — Neural Network Demo</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="nn.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Menlo', 'Consolas', monospace;
      background: #f5f5f0;
      color: #1a1a1a;
    }
    #root { min-height: 100vh; }

    .app {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin: 0 0 24px;
      color: #333;
      text-transform: uppercase;
    }
    .layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    /* --- sidebar --- */
    .sidebar {
      width: 180px;
      flex-shrink: 0;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 4px;
    }
    .field select,
    .field input {
      width: 100%;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 0.85rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      color: #1a1a1a;
      outline: none;
    }
    .field select:focus,
    .field input:focus { border-color: #888; }

    .btn {
      width: 100%;
      padding: 9px 0;
      margin-top: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-train  { background: #1a1a1a; color: #fff; }
    .btn-reset  { background: #e5e5e5; color: #444; margin-top: 6px; }
    .btn-train:hover:not(:disabled) { background: #333; }
    .btn-reset:hover:not(:disabled) { background: #d0d0d0; }

    .status-box {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #666;
      line-height: 1.8;
    }
    .status-box .val { color: #1a1a1a; font-weight: 600; }
    .progress-bar-wrap {
      margin-top: 6px;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #1a1a1a;
      border-radius: 2px;
      transition: width 0.1s linear;
    }

    /* --- canvas area --- */
    .canvas-area { flex: 1; min-width: 0; }
    canvas {
      display: block;
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }
    .canvas-label {
      font-size: 0.7rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .canvas-label + canvas { margin-bottom: 14px; }

    .legend {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: 0.72rem;
      color: #666;
    }
    .legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .legend-line {
      display: inline-block;
      width: 18px; height: 3px;
      border-radius: 2px;
      margin-right: 5px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const VIEWPORT = 1.35;  // show [-V, V] x [-V, V]
const SNAP_POINTS = 100;
const NUM_SNAPSHOTS = 20;

const SPEEDS = [
  { label: 'slow (1 ep/frame)',  steps: 1 },
  { label: 'normal (4 ep/frame)', steps: 4 },
  { label: 'fast (16 ep/frame)', steps: 16 },
];

// ---- drawing helpers ----

function toCanvas(x, y, w, h) {
  const pad = 28;
  const uw = w - 2 * pad;
  const uh = h - 2 * pad;
  const range = VIEWPORT * 2;
  const cx = pad + (x + VIEWPORT) / range * uw;
  const cy = pad + (VIEWPORT - y) / range * uh;
  return [cx, cy];
}

function drawFigure(ctx, dataset, netX, netY, w, h) {
  ctx.clearRect(0, 0, w, h);

  // grid
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 1;
  for (let v = -1; v <= 1; v += 0.5) {
    const [x0] = toCanvas(v, -VIEWPORT, w, h);
    const [, y0] = toCanvas(-VIEWPORT, v, w, h);
    ctx.beginPath(); ctx.moveTo(x0, 0); ctx.lineTo(x0, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(w, y0); ctx.stroke();
  }

  // axes
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  const [ax] = toCanvas(0, 0, w, h);
  const [, ay] = toCanvas(0, 0, w, h);
  ctx.beginPath(); ctx.moveTo(ax, 0); ctx.lineTo(ax, h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, ay); ctx.lineTo(w, ay); ctx.stroke();

  // target dots
  ctx.fillStyle = '#3b82f6';
  for (const [, dx, dy] of dataset) {
    const [cx, cy] = toCanvas(dx, dy, w, h);
    ctx.beginPath();
    ctx.arc(cx, cy, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // network curve
  if (netX && netX.length > 0) {
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < netX.length; i++) {
      const [cx, cy] = toCanvas(netX[i], netY[i], w, h);
      i === 0 ? ctx.moveTo(cx, cy) : ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }
}

function drawLoss(ctx, lossHistory, epochs, w, h) {
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#fafafa';
  ctx.fillRect(0, 0, w, h);

  if (lossHistory.length < 2) return;

  const pad = { top: 8, right: 12, bottom: 18, left: 40 };
  const uw = w - pad.left - pad.right;
  const uh = h - pad.top - pad.bottom;

  const maxL = Math.max(...lossHistory) * 1.05;
  const minL = 0;

  function lx(i) { return pad.left + (i / (epochs - 1)) * uw; }
  function ly(v) { return pad.top + uh - ((v - minL) / (maxL - minL || 1)) * uh; }

  // grid
  ctx.strokeStyle = '#eee';
  ctx.lineWidth = 1;
  for (let g = 0; g <= 4; g++) {
    const yv = minL + (maxL - minL) * g / 4;
    const y = ly(yv);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#bbb';
    ctx.font = '9px Menlo, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(yv.toFixed(3), pad.left - 4, y + 3);
  }

  // loss curve
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < lossHistory.length; i++) {
    const x = lx(i);
    const y = ly(lossHistory[i]);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // axis labels
  ctx.fillStyle = '#aaa';
  ctx.font = '9px Menlo, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('0', pad.left, h - 3);
  ctx.fillText(String(epochs), w - pad.right, h - 3);
  ctx.fillText('epoch', pad.left + uw / 2, h - 3);
}

// ---- main app ----

function App() {
  const [fig, setFig] = useState('circle');
  const [lr, setLr] = useState('0.1');
  const [epochs, setEpochs] = useState('500');
  const [batchSize, setBatchSize] = useState('8');
  const [seed, setSeed] = useState('123');
  const [speedIdx, setSpeedIdx] = useState(1);
  const [status, setStatus] = useState('idle');   // idle | training | done
  const [currentEpoch, setCurrentEpoch] = useState(0);
  const [currentLoss, setCurrentLoss] = useState(null);

  const mainCanvas = useRef(null);
  const lossCanvas = useRef(null);
  const modelRef = useRef(null);
  const datasetRef = useRef(null);
  const genRef = useRef(null);
  const rafRef = useRef(null);
  const lossHistoryRef = useRef([]);
  const netCurveRef = useRef(null);

  // initial draw when figure changes (idle state)
  useEffect(() => {
    if (status !== 'idle') return;
    const canvas = mainCanvas.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    const dataset = points(fig, 100);
    datasetRef.current = dataset;
    drawFigure(ctx, dataset, null, null, w, h);

    const lctx = lossCanvas.current.getContext('2d');
    drawLoss(lctx, [], parseInt(epochs) || 500, lossCanvas.current.width, lossCanvas.current.height);
  }, [fig, status]);

  function startTraining() {
    cancelAnimationFrame(rafRef.current);
    const ep = Math.max(1, parseInt(epochs) || 500);
    const bs = Math.max(1, parseInt(batchSize) || 8);
    const lrVal = parseFloat(lr) || 0.1;
    const sd = parseInt(seed) || 123;

    const dataset = points(fig, 100);
    datasetRef.current = dataset;
    const model = new SimpleNN(1, 20, 20, 2, sd);
    modelRef.current = model;
    lossHistoryRef.current = [];
    netCurveRef.current = null;
    setCurrentEpoch(0);
    setCurrentLoss(null);
    setStatus('training');

    const gen = sgd(model, dataset, lrVal, ep, bs, NUM_SNAPSHOTS, SNAP_POINTS);
    genRef.current = gen;

    const steps = SPEEDS[speedIdx].steps;

    function loop() {
      const mainCtx = mainCanvas.current.getContext('2d');
      const w = mainCanvas.current.width;
      const h = mainCanvas.current.height;
      const lctx = lossCanvas.current.getContext('2d');
      const lw = lossCanvas.current.width;
      const lh = lossCanvas.current.height;

      let done = false;
      let lastEpoch = 0;
      let lastLoss = 0;

      for (let s = 0; s < steps; s++) {
        const result = gen.next();
        if (result.done) { done = true; break; }
        const { epoch, loss } = result.value;
        lastEpoch = epoch;
        lastLoss = loss;
        lossHistoryRef.current.push(loss);
      }

      // draw current network output
      const tList = Array.from({ length: SNAP_POINTS + 1 }, (_, i) => i / SNAP_POINTS);
      const [netX, netY] = model.getGraph(tList);
      netCurveRef.current = { netX, netY };

      drawFigure(mainCtx, datasetRef.current, netX, netY, w, h);
      drawLoss(lctx, lossHistoryRef.current, ep, lw, lh);
      setCurrentEpoch(lastEpoch + 1);
      setCurrentLoss(lastLoss);

      if (done) {
        setStatus('done');
      } else {
        rafRef.current = requestAnimationFrame(loop);
      }
    }

    rafRef.current = requestAnimationFrame(loop);
  }

  function reset() {
    cancelAnimationFrame(rafRef.current);
    genRef.current = null;
    modelRef.current = null;
    lossHistoryRef.current = [];
    netCurveRef.current = null;
    setStatus('idle');
    setCurrentEpoch(0);
    setCurrentLoss(null);
  }

  const isTraining = status === 'training';
  const ep = parseInt(epochs) || 500;
  const progress = ep > 0 ? Math.min(100, (currentEpoch / ep) * 100) : 0;

  return (
    <div className="app">
      <h1>Naive SGD — Neural Network Demo</h1>
      <div className="layout">
        {/* sidebar */}
        <div className="sidebar">
          <div className="field">
            <label>Figure</label>
            <select value={fig} onChange={e => setFig(e.target.value)} disabled={isTraining}>
              <option value="circle">circle</option>
              <option value="heart">heart</option>
              <option value="astroid">astroid</option>
              <option value="trefoil">trefoil</option>
              <option value="square">square</option>
            </select>
          </div>
          <div className="field">
            <label>Learning rate</label>
            <input type="number" value={lr} onChange={e => setLr(e.target.value)}
              step="0.01" min="0.001" max="10" disabled={isTraining} />
          </div>
          <div className="field">
            <label>Epochs</label>
            <input type="number" value={epochs} onChange={e => setEpochs(e.target.value)}
              step="100" min="10" max="5000" disabled={isTraining} />
          </div>
          <div className="field">
            <label>Batch size</label>
            <input type="number" value={batchSize} onChange={e => setBatchSize(e.target.value)}
              step="1" min="1" max="100" disabled={isTraining} />
          </div>
          <div className="field">
            <label>Seed</label>
            <input type="number" value={seed} onChange={e => setSeed(e.target.value)}
              step="1" min="0" disabled={isTraining} />
          </div>
          <div className="field">
            <label>Speed</label>
            <select value={speedIdx} onChange={e => setSpeedIdx(Number(e.target.value))} disabled={isTraining}>
              {SPEEDS.map((s, i) => (
                <option key={i} value={i}>{s.label}</option>
              ))}
            </select>
          </div>
          <button className="btn btn-train" onClick={startTraining} disabled={isTraining}>
            {isTraining ? 'training…' : status === 'done' ? 'train again' : 'train'}
          </button>
          <button className="btn btn-reset" onClick={reset} disabled={isTraining}>
            reset
          </button>

          {(isTraining || status === 'done') && (
            <div className="status-box">
              <div>epoch <span className="val">{currentEpoch}</span> / {ep}</div>
              {currentLoss !== null && (
                <div>loss <span className="val">{currentLoss.toFixed(5)}</span></div>
              )}
              {status === 'done' && <div style={{color:'#16a34a'}}>done ✓</div>}
              <div className="progress-bar-wrap">
                <div className="progress-bar-fill" style={{ width: progress + '%' }} />
              </div>
            </div>
          )}
        </div>

        {/* canvas area */}
        <div className="canvas-area">
          <div className="canvas-label">figure space</div>
          <canvas ref={mainCanvas} width={560} height={480}
            style={{ marginBottom: 14 }} />

          <div className="canvas-label">loss curve</div>
          <canvas ref={lossCanvas} width={560} height={100} />

          <div className="legend">
            <span><span className="legend-dot" style={{background:'#3b82f6'}} />target points</span>
            <span><span className="legend-line" style={{background:'#ef4444'}} />network output</span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
